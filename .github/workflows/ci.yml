name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - "develop"
      - "feature/**"
    tags-ignore:
      - "**"
    paths-ignore:
      - "**.md"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  RUST_BACKTRACE: 1

jobs:
  ci:
    name: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
          - os: ubuntu-24.04-arm
          - os: ubuntu-22.04
          - os: ubuntu-22.04-arm
          - os: macos-26
          - os: macos-15
          - os: windows-2025
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - run: rustup update stable

      - name: Install build dependencies (Ubuntu)
        if: startsWith(matrix.os, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y build-essential nasm

      - name: Install NASM (Windows)
        if: startsWith(matrix.os, 'windows')
        run: choco install nasm -y

      - uses: shiguredo/github-actions/.github/actions/rust-cache@main
        with:
          os: ${{ matrix.os }}
          toolchain: stable

      - run: cargo fmt --all --check
      - run: cargo clippy --features source-build -- -D warnings
      - run: cargo test --features source-build

  # docs.rs 向けビルド確認
  docs-rs:
    name: docs.rs
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      DOCS_RS: 1
    steps:
      - uses: actions/checkout@v6
      - run: rustup update stable
      - run: cargo doc --no-deps

  slack_notify:
    needs:
      - ci
      - docs-rs
    runs-on: ubuntu-slim
    timeout-minutes: 5
    if: ${{ always() }}
    permissions:
      actions: read
    steps:
      - name: Slack Notification
        uses: shiguredo/github-actions/.github/actions/slack-notify@main
        with:
          status: ${{ job.status }}
          slack_webhook: ${{ secrets.SLACK_WEBHOOK }}
          slack_channel: rust-oss
          notify_mode: failure_and_fixed
        env:
          GH_TOKEN: ${{ github.token }}
